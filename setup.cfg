[flake8]
max-line-length = 120
exclude =
    .git,
    __pycache__,
    */migrations/*,
    venv,
    .venv,
    staticfiles
ignore = E203, W503, E501

[isort]
profile = black
known_django = django
known_first_party = apps,config
sections = FUTURE,STDLIB,THIRDPARTY,DJANGO,FIRSTPARTY,LOCALFOLDER
multi_line_output = 3
line_length = 120

[mypy]
python_version = 3.12
ignore_missing_imports = True
exclude = migrations

[tool:pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
