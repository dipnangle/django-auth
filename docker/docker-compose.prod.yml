version: "3.9"

# Production compose file.
# Usage:
#   docker-compose -f docker/docker-compose.prod.yml up -d
#
# Required env file: /etc/platform/.env (never commit this)

services:

  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-backups:/backups
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  api:
    image: ${DOCKER_IMAGE:-platform-api}:${VERSION:-latest}
    restart: always
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class gthread --threads 2 --timeout 60 --keep-alive 5 --log-level info --access-logfile - --error-logfile -
    env_file: /etc/platform/.env
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - backend
      - frontend

  celery:
    image: ${DOCKER_IMAGE:-platform-api}:${VERSION:-latest}
    restart: always
    command: celery -A config worker -l info --concurrency=4 -Q default,email,cleanup
    env_file: /etc/platform/.env
    depends_on:
      - api
      - redis
    networks:
      - backend

  celery-beat:
    image: ${DOCKER_IMAGE:-platform-api}:${VERSION:-latest}
    restart: always
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: /etc/platform/.env
    depends_on:
      - api
      - celery
    networks:
      - backend

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
      - /etc/letsencrypt:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - api
    networks:
      - frontend

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
  certbot_webroot:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
