# ─────────────────────────────────────────────
# Platform API — HTTPS site config
# Place in docker/nginx/conf.d/platform.conf
# Replace YOUR_DOMAIN with your actual domain
# ─────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── SSL ──────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security Headers ─────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── File upload limit ─────────────────────
    client_max_body_size 20M;

    # ── Static files (served directly by nginx) ──
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Auth endpoints — strict rate limit ───
    location ~ ^/api/v1/auth/(login|register|password)/ {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://django;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Health check — no rate limit ─────────
    location /api/health/ {
        proxy_pass         http://django;
        proxy_set_header   Host $http_host;
        access_log off;
    }

    # ── All other API endpoints ───────────────
    location / {
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;

        proxy_pass         http://django;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Disable buffering for streaming responses
        proxy_buffering    off;
    }

    # ── 429 custom response ───────────────────
    error_page 429 /429.json;
    location = /429.json {
        return 429 '{"error":{"code":"RATE_LIMIT_EXCEEDED","message":"Too many requests. Please slow down."}}';
        add_header Content-Type application/json;
    }
}
