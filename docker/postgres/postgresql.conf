# PostgreSQL production config
# Tune based on your server RAM — this is set for a 4GB RAM server

# Connections
max_connections = 100

# Memory (adjust for your RAM — total should be ~75% of available)
shared_buffers = 1GB
effective_cache_size = 3GB
work_mem = 16MB
maintenance_work_mem = 256MB

# Write performance
wal_buffers = 16MB
checkpoint_completion_target = 0.9
synchronous_commit = on

# Query planning
default_statistics_target = 100
random_page_cost = 1.1          # SSD — use 4.0 for HDD
effective_io_concurrency = 200  # SSD — use 2 for HDD

# Logging
log_destination = 'stderr'
logging_collector = off         # Let Docker collect logs
log_min_duration_statement = 500  # Log slow queries > 500ms
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on

# Locale
timezone = 'UTC'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
