version: "3.9"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: platform_dev
      POSTGRES_USER: platform_user
      POSTGRES_PASSWORD: platform_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform_user -d platform_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Django API
  # ─────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_ENV: development
      DJANGO_SECRET_KEY: dev-secret-key-change-in-prod
      DJANGO_DEBUG: "True"
      DB_NAME: platform_dev
      DB_USER: platform_user
      DB_PASSWORD: platform_pass
      DB_HOST: db
      REDIS_URL: redis://redis:6379
      DEPLOYMENT_MODE: saas
      PLATFORM_NAME: Platform
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # Celery Worker
  # ─────────────────────────────────────────────
  celery:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=4
    volumes:
      - ..:/app
    environment:
      DJANGO_ENV: development
      DJANGO_SECRET_KEY: dev-secret-key-change-in-prod
      DB_NAME: platform_dev
      DB_USER: platform_user
      DB_PASSWORD: platform_pass
      DB_HOST: db
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/3
    depends_on:
      - api
      - redis

  # ─────────────────────────────────────────────
  # Celery Beat (scheduler)
  # ─────────────────────────────────────────────
  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ..:/app
    environment:
      DJANGO_ENV: development
      DJANGO_SECRET_KEY: dev-secret-key-change-in-prod
      DB_NAME: platform_dev
      DB_USER: platform_user
      DB_PASSWORD: platform_pass
      DB_HOST: db
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/3
    depends_on:
      - api
      - celery

volumes:
  postgres_data:
  redis_data:
